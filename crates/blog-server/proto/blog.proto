syntax = "proto3";

package blog;

// Сервис биржи
service BlogService {
  // Регистрация
  rpc Register(RegisterRequest) returns (UserResponse);

  // Логин
  rpc Login(LoginRequest) returns (UserResponse);

  // Создание поста
  rpc CreatePost(CreatePostRequest) returns (Post);

  // Получение поста
  rpc GetPost(PostIdRequest) returns (Post);

  // Обновление поста
  rpc UpdatePost(UpdatePostRequest) returns (Post);

  // Удаление поста
  rpc DeletePost(PostIdRequest) returns (DeletePostResponse);

  // Получение постов
  rpc ListPosts(ListPostsRequest) returns (ListPostsResponse);
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message CreatePostRequest {
  string title = 1;
  string content = 2;
}

message PostIdRequest {
  string id = 1;
}

message UpdatePostRequest {
  string id = 1;
  string title = 2;
  string content = 3;
}

message ListPostsRequest {
  int64 limit = 1;
  int64 offset = 2;
}

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string password_hash = 4;
  int64 created_at = 5;
}

message Post {
  string id = 1;
  string author_id = 2;
  string title = 3;
  string content = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message UserResponse {
  string token = 1;
  User user = 2;
}

message DeletePostResponse {}

message ListPostsResponse {
  repeated Post posts = 1;
  uint64 total = 2;
  int64 limit = 3;
  int64 offset = 4;
}
